<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case Search Interface</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Case Search Interface</h1>
    </header>
    <main>
        <form id="search-form">
            <label for="case-number">Case Number:</label>
            <input type="text" id="case-number" name="case-number" required>
            <button type="submit">Search</button>
        </form>
        <div id="results">
            <!-- Search results will be displayed here -->
        </div>
    </main>
    <footer>
        <p>&copy; 2026 Case Search Interface. All rights reserved.</p>
    </footer>
</body>
</html>
